<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>crystal.ap</title>
<style>
  @font-face {
    font-family: "Pokemon GB";
    src: url("/fonts/PokemonGb.ttf") format("truetype");
    font-display: swap;
  }
  :root {
    /* Palette lifted from the Pokemon Crystal title screen:
       near-black background, cream logo fill, lavender/purple (ARCHIPELAGO
       title + Suicune silhouette) as primary accent, Crystal's hot pink
       (CRYSTAL VERSION badge) for alerts / active states. */
    --bg-0: #0d1018;
    --bg-1: #181a26;
    --bg-2: #22243a;
    --bg-3: #2d304c;
    --ink-0: #f0e8d0;   /* logo cream */
    --ink-1: #b2a4d0;   /* lavender-tinted body */
    --ink-2: #9a90bb;   /* muted — lifted from #8b82a8 to clear AA on bg-2 panels */
    --ink-3: #3b3752;
    --jade: #957bc2;          /* was jade — now lavender primary */
    --jade-deep: #5d4b8a;
    --jade-bright: #c7aff0;
    --coral: #f25c8f;         /* Crystal pink — lifted from #eb3b79 so small text clears AA */
    --coral-deep: #a8205a;
    --amber: #e0c060;         /* gold for warnings — pushed off the cream --ink-0 so warn != info */
    --line: #2c2b44;
    --line-bright: #3a3857;
    --mono: ui-monospace, "SF Mono", "IBM Plex Mono", "Monaco", "Menlo", "Consolas", monospace;
    --display: ui-serif, "Iowan Old Style", "Apple Garamond", "Baskerville", "Hoefler Text", "Garamond", "Georgia", serif;
    /* emulator pixel multiplier — drives canvas size, scanline spacing, and
       the idle placeholder so everything snaps to an integer scale. */
    --scale: 3;
    --screen-w: calc(160 * var(--scale) * 1px);
    --screen-h: calc(144 * var(--scale) * 1px);
  }
  @media (min-width: 1500px) { :root { --scale: 4; } }
  @media (min-width: 1900px) { :root { --scale: 5; } }

  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg-0);
    color: var(--ink-0);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    /* subtle grain, fixed */
    background-image:
      radial-gradient(at 15% 10%, rgba(149,123,194,0.04), transparent 40%),
      radial-gradient(at 85% 90%, rgba(235,59,121,0.035), transparent 45%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92  0 0 0 0 0.89  0 0 0 0 0.81  0 0 0 0.025 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-attachment: fixed;
  }
  a { color: var(--jade-bright); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 160ms; }
  a:hover { border-bottom-color: var(--jade-bright); }

  ::selection { background: var(--jade-deep); color: var(--ink-0); }

  /* ---------- layout skeleton ---------- */
  .app {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(to bottom, rgba(24,26,38,0.92), rgba(13,16,24,0.92));
  }
  .nav-spacer { flex: 1; }
  .brand {
    display: flex; align-items: baseline; gap: 10px;
    font-family: "Pokemon GB", var(--mono);
    font-size: 14px;
    letter-spacing: 0;
    color: var(--ink-0);
    text-decoration: none;
    cursor: pointer;
  }
  .brand { border-bottom: 1px solid transparent; }
  .brand:hover { color: var(--jade-bright); border-bottom-color: transparent; }
  .gh-link {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    color: var(--ink-1);
    transition: color 140ms, filter 140ms;
  }
  .gh-link:hover { color: var(--jade-bright); filter: drop-shadow(0 0 6px rgba(149,123,194,0.6)); border-bottom-color: transparent; }
  .gh-link svg { width: 20px; height: 20px; display: block; fill: currentColor; }
  .brand small {
    font-family: var(--mono);
    font-style: normal;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .world-version {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-1);
    padding: 3px 8px;
    border: 1px solid var(--line-bright);
    cursor: default;
  }

  .session-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-1);
    appearance: none;
    -webkit-appearance: none;
    cursor: default;
  }
  /* On touch viewports the chip doubles as the trigger for the connection
     popup — give it a pressable affordance only then. */
  .session-chip[data-tappable="true"] { cursor: pointer; }
  .session-chip[data-tappable="true"]:active { transform: scale(0.97); }
  .session-chip .dot {
    width: 8px; height: 8px;
    background: var(--ink-2);
    border-radius: 50%;
  }
  .session-chip[data-state="connecting"] { color: var(--amber); border-color: rgba(232,213,160,0.4); }
  .session-chip[data-state="connecting"] .dot { background: var(--amber); animation: pulse-fast 900ms infinite; }
  .session-chip[data-state="live"] { color: var(--jade-bright); border-color: rgba(149,123,194,0.4); }
  .session-chip[data-state="live"] .dot { background: var(--jade); box-shadow: 0 0 8px var(--jade); animation: pulse 1.6s infinite; }
  .session-chip[data-state="error"] { color: var(--coral); border-color: rgba(235,59,121,0.4); }
  .session-chip[data-state="error"] .dot { background: var(--coral); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes pulse-fast {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ---------- main area ---------- */
  main { position: relative; }

  /* HOME (options / generating / rom): blurb sidebar + swappable pane.
     Hidden when the app is in the play step. */
  .home {
    display: grid;
    grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
    gap: 40px;
    padding: 40px 20px 48px;
    max-width: 1200px;
    margin: 0 auto;
    animation: step-in 440ms cubic-bezier(.22,1,.36,1) both;
  }
  .app[data-step="play"] .home { display: none; }

  /* PLAY step */
  .step {
    display: none;
    min-height: calc(100vh - 90px);
    padding: 32px 20px 48px;
    position: relative;
  }
  .app[data-step="play"] .step[data-step="play"] {
    display: block;
    animation: step-in 440ms cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes step-in {
    0%   { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0);    }
  }

  /* ---------- blurb ---------- */
  .blurb { color: var(--ink-1); }
  .blurb h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(22px, 2.2vw, 28px);
    line-height: 1.45;
    letter-spacing: -0.005em;
    margin: 0 0 20px;
    color: var(--ink-0);
    overflow-wrap: break-word;
  }
  .blurb h1 em { font-style: italic; color: var(--coral); }
  .blurb-title {
    font-family: "Pokemon GB", var(--mono);
    font-size: clamp(16px, 1.6vw, 21px);
    letter-spacing: 0;
    line-height: 1.2;
  }
  /* Highlights inherit the surrounding font so baselines don't shift —
     only the color changes. Cream against the lavender body gives a proper
     contrast bump. Links get the same cream + a subtle underline hint. */
  .blurb b { font-weight: inherit; color: var(--ink-0); }
  .blurb-list b { color: var(--ink-0); }
  .blurb a {
    color: var(--ink-0);
    text-decoration: none;
    border-bottom: 1px solid rgba(240, 232, 208, 0.25);
    transition: color 160ms, border-color 160ms;
  }
  .blurb a:hover {
    color: var(--jade-bright);
    border-bottom-color: var(--jade-bright);
  }
  .blurb p {
    font-family: var(--display);
    font-style: italic;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-1);
    margin: 0 0 16px;
  }
  .blurb-list {
    list-style: none; padding: 0; margin: 18px 0;
    display: flex; flex-direction: column; gap: 12px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-1);
  }
  .blurb-list li {
    padding-left: 18px;
    position: relative;
  }
  .blurb-list li::before {
    content: '';
    position: absolute;
    left: 0; top: 0.6em;
    width: 6px; height: 6px;
    background: var(--jade);
    transform: rotate(45deg);
  }

  /* ---------- home main (right column) ---------- */
  .home-main {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .home-pane { display: none; flex-direction: column; gap: 20px; }
  .app[data-step="options"]    .home-pane[data-pane="options"],
  .app[data-step="generating"] .home-pane[data-pane="generating"],
  .app[data-step="rom"]        .home-pane[data-pane="rom"],
  .app[data-step="patching"]   .home-pane[data-pane="rom"] {
    display: flex;
    animation: step-in 320ms cubic-bezier(.22,1,.36,1) both;
  }
  /* During patching, hide the drop prompt so only the progress/errors show. */
  .app[data-step="patching"] .home-pane[data-pane="rom"] .dropzone,
  .app[data-step="patching"] .home-pane[data-pane="rom"] .tip,
  .app[data-step="patching"] .home-pane[data-pane="rom"] .legend {
    display: none;
  }

  /* ---------- home cards ---------- */
  .home-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 20px 22px 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }
  .home-card::before, .home-card::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--jade-deep);
    border-style: solid;
    pointer-events: none;
  }
  .home-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .home-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .card-head { display: flex; justify-content: space-between; align-items: baseline; }

  h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: 44px;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin: 0;
  }
  h1 em {
    font-style: italic;
    color: var(--jade-bright);
  }

  .tip {
    font-family: var(--display);
    font-style: italic;
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink-1);
    margin: 0;
    max-width: 52ch;
  }
  .tip strong {
    font-style: normal;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--coral);
    padding: 2px 6px;
    background: rgba(235,59,121,0.08);
    border: 1px solid rgba(235,59,121,0.22);
    margin-right: 4px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-2);
  }

  /* ---------- dropzone ---------- */
  .dropzone {
    position: relative;
    border: 1px dashed var(--line-bright);
    background: linear-gradient(135deg, var(--bg-1) 0%, rgba(29,34,35,0.4) 100%);
    padding: 48px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 200ms, background 200ms, transform 200ms;
  }
  .dropzone::before,
  .dropzone::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border: 1px solid var(--jade);
  }
  .dropzone::before {
    top: -1px; left: -1px;
    border-right: none; border-bottom: none;
  }
  .dropzone::after {
    bottom: -1px; right: -1px;
    border-left: none; border-top: none;
  }
  .dropzone.drag-over {
    border-color: var(--jade-bright);
    background: linear-gradient(135deg, rgba(149,123,194,0.1) 0%, rgba(149,123,194,0.02) 100%);
    transform: scale(1.003);
  }
  .dz-mark {
    font-family: var(--display);
    font-size: 48px;
    line-height: 1;
    color: var(--jade);
  }
  .dz-primary {
    font-family: var(--display);
    font-size: 18px;
    font-style: italic;
    color: var(--ink-0);
  }
  .dz-meta {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .dropzone input[type="file"] {
    position: absolute;
    left: -9999px;
    opacity: 0;
    pointer-events: none;
  }

  /* ---------- toggle switch ---------- */
  .switch {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    align-self: flex-start;
  }
  .switch input { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
  .switch-track {
    position: relative;
    width: 32px; height: 16px;
    background: var(--bg-2);
    border: 1px solid var(--line-bright);
    border-radius: 10px;
    transition: background 160ms, border-color 160ms;
  }
  .switch-knob {
    position: absolute;
    top: 1px; left: 1px;
    width: 12px; height: 12px;
    background: var(--ink-2);
    border-radius: 50%;
    transition: transform 160ms, background 160ms;
  }
  .switch input:checked + .switch-track {
    background: rgba(149,123,194,0.2);
    border-color: var(--jade);
  }
  .switch input:checked + .switch-track .switch-knob {
    transform: translateX(16px);
    background: var(--jade-bright);
  }
  .switch-text {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .switch input:checked ~ .switch-text { color: var(--ink-0); }

  .ctrl-bg-switch { margin: 16px 0 4px; }
  .switch-text b {
    color: var(--jade-bright);
    font-weight: inherit;
  }

  /* ---------- host-pref dropdown ---------- */
  .host-pref {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 4px;
    cursor: pointer;
    align-self: flex-start;
  }
  .host-pref-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .host-pref-select {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-0);
    background: var(--bg-2);
    border: 1px solid var(--line-bright);
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
    transition: border-color 160ms;
  }
  .host-pref-select:hover  { border-color: var(--jade); }
  .host-pref-select:focus  { border-color: var(--jade-bright); outline: none; }
  /* Inline variant for the saved-yamls footer — sits flush, smaller margin. */
  .host-pref-inline { margin: 0; }
  .host-pref-inline .host-pref-select { padding: 2px 6px; font-size: 11px; }
  /* Footer row at the bottom of the saved-yamls table. */
  .resume-foot {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 8px 16px;
    border-top: 1px solid var(--line);
    background: var(--bg-2);
  }

  /* ---------- self-hosted badge (in session form) ---------- */
  .self-hosted-badge {
    display: inline-block;
    margin-top: 4px;
    padding: 2px 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--jade-bright);
    border: 1px solid var(--jade);
    border-radius: 3px;
    background: rgba(149,123,194,0.10);
    align-self: flex-start;
  }

  /* ---------- buttons ---------- */
  .btn, button {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: var(--bg-2);
    color: var(--ink-0);
    border: 1px solid var(--line-bright);
    padding: 10px 18px;
    cursor: pointer;
    transition: background 140ms, border-color 140ms, color 140ms;
  }
  .btn:hover, button:hover { background: var(--bg-3); border-color: var(--jade); }
  .btn:disabled, button:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary {
    background: var(--jade-deep);
    color: var(--ink-0);
    border-color: var(--jade);
  }
  .btn-primary:hover { background: var(--jade); color: var(--bg-0); }

  /* ---------- progress bar ---------- */
  .progress-bar {
    position: relative;
    height: 4px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .progress-sweep {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 28%;
    background: linear-gradient(90deg, transparent, var(--jade), transparent);
    animation: sweep 1.8s ease-in-out infinite;
  }
  @keyframes sweep {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(360%); }
  }

  /* ---------- seed meta (dl) ---------- */
  .seed-meta {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 6px 20px;
    margin: 0;
    font-family: var(--mono);
    font-size: 12px;
  }
  .seed-meta dt {
    color: var(--ink-2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 10px;
    align-self: center;
  }
  .seed-meta dd { margin: 0; color: var(--ink-0); word-break: break-all; }

  .seed-result {
    display: flex; flex-direction: column; gap: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    animation: step-in 400ms cubic-bezier(.22,1,.36,1) both;
  }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .result-chip {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-0);
    text-decoration: none;
    transition: background 140ms, border-color 140ms;
  }
  .result-chip:hover { background: var(--bg-2); border-color: var(--jade); }
  .result-chip .chip-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .result-chip .label { color: var(--ink-1); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
  .result-chip .title {
    color: var(--ink-0);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .result-chip .arrow { color: var(--jade-bright); font-family: var(--display); font-style: italic; flex: 0 0 auto; }

  /* ---------- error ---------- */
  .resume-list {
    border: 1px solid var(--line);
    background: linear-gradient(135deg, var(--bg-1) 0%, rgba(29,34,35,0.3) 100%);
    padding: 0;
    margin-bottom: 8px;
    animation: step-in 320ms cubic-bezier(.22,1,.36,1) both;
  }
  .resume-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-2);
  }
  .resume-head-hint {
    font-family: var(--display);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-2);
  }
  .resume-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 12px;
  }
  .resume-row:last-child { border-bottom: none; }
  .resume-row:hover { background: rgba(149,123,194,0.04); }
  .resume-row .slot {
    color: var(--jade-bright);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .resume-row .id {
    color: var(--ink-2);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .resume-row .rom-cached {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--jade-bright);
    background: rgba(149,123,194,0.08);
    border: 1px solid rgba(149,123,194,0.3);
    padding: 1px 5px;
    border-radius: 2px;
  }
  .resume-row .rom-evicted {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--coral);
    background: rgba(235,59,121,0.06);
    border: 1px solid var(--coral-deep);
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  /* Dim the identity cells of an evicted row, but not .actions — the forget
     button (and the open-room link) still work and shouldn't read as disabled. */
  .resume-row[data-evicted="true"] > :not(.actions) { opacity: 0.72; }
  .resume-row .resume-dead-hint {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-2);
    text-transform: uppercase;
    text-align: center;
    padding: 0 4px;
  }
  .resume-row .meta {
    color: var(--ink-1);
    font-size: 11px;
    text-align: right;
  }
  .resume-row .meta em {
    font-family: var(--display);
    font-style: italic;
    color: var(--ink-2);
    display: block;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .resume-row .actions {
    display: flex; gap: 4px;
  }
  .resume-row .actions button {
    padding: 6px 10px;
    font-size: 10px;
    letter-spacing: 0.16em;
  }
  .resume-row .actions .forget {
    background: transparent;
    border-color: var(--line);
    color: var(--ink-2);
  }
  .resume-row .actions .forget:hover {
    color: var(--coral);
    border-color: var(--coral-deep);
  }

  .error-box {
    border-left: 3px solid var(--coral);
    background: rgba(235,59,121,0.06);
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-0);
    max-height: 320px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .error-box .err-title {
    color: var(--coral);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .error-box > span[id$="-err-msg"] {
    white-space: pre-wrap;
  }
  .err-back {
    display: none;        /* visible only when the paired error-box is shown */
    align-self: flex-start;
    background: transparent;
    border: 1px solid rgba(235,59,121,0.35);
    color: var(--coral);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
  }
  .err-back:hover { background: rgba(235,59,121,0.12); border-color: var(--coral); color: var(--ink-0); }
  .error-box:not([hidden]) + .err-back { display: inline-block; }

  /* ---------- rom progress ---------- */
  .rom-progress {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--jade-bright);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .spinner {
    display: inline-block;
    animation: spin 1.2s linear infinite;
    font-size: 16px;
    color: var(--jade);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- play view ---------- */
  .step[data-step="play"] {
    padding: 40px 32px 24px;
    display: none;
  }
  .app[data-step="play"] .step[data-step="play"] { display: block; }

  .play-stack {
    display: grid;
    grid-template-columns: auto minmax(360px, 1fr);
    gap: 28px;
    align-items: stretch;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
  }
  /* Screen-frame is nested inside .play-game (which is display:contents on
     desktop), so use descendant combinators — a `>` combinator won't match
     through the wrapper even though it visually dissolves. */
  .play-stack .screen-frame { justify-self: start; align-self: start; }
  /* .play-game is a real flex container on mobile (defined in the media
     query) but dissolves on desktop so screen-frame participates directly
     in the 2-col grid. */
  .play-game { display: contents; }
  .play-controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0; /* allow child flex overflow */
    /* Cap the column so the grid row doesn't grow unbounded with every
       log entry (log-wrap can't scroll unless its ancestors are
       bounded). The layout helper publishes --play-controls-h equal to
       the screen-frame's height in desktop mode so the column tracks the
       emulator instead of the viewport — important on short viewports
       where 100vh - 180px would clip the console below the emulator.
       Falls back to the old viewport cap until the helper has measured. */
    max-height: var(--play-controls-h, calc(100vh - 180px));
  }
  /* Connection form + session links. On desktop this is a plain flow block
     in the controls column; on touch viewports it detaches into a popup
     anchored from the nav session chip (see the mobile media query). */
  .connect-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .connect-backdrop { display: none; }
  .connect-panel-head { display: none; }
  .log-area {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 160px;
  }
  .log-wrap {
    flex: 1;
    overflow: auto;
    border: 1px solid var(--line);
    border-top: none;
    background: var(--bg-1);
  }

  .screen-frame {
    position: relative;
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 14px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .screen-frame::before, .screen-frame::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border: 1px solid var(--coral);
    pointer-events: none;
  }
  .screen-frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .screen-frame::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .screen-label-bottom {
    width: 100%;
    display: flex;
    gap: 16px;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-1);
  }
  .screen-label-bottom .screen-keys { flex: 1; }
  /* Anchor .vol to the right so the slider's position stays stable when
     the label text changes width (e.g. "vol" <-> "mute"). */
  .screen-label-bottom .vol { margin-left: auto; }

  .fs-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    padding: 0;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-1);
    cursor: pointer;
    transition: color 140ms;
  }
  .fs-btn:hover { background: transparent; border-color: transparent; color: var(--jade-bright); }
  .fs-btn svg { width: 16px; height: 16px; display: block; }

  /* Fullscreen targets .play-game (not just .screen-frame) so the on-screen
     gamepad rides into the top-layer alongside the canvas on touch devices.
     Desktop has .gamepad { display: none } so the layout collapses to just
     the screen-frame filling the viewport. */
  .play-game:fullscreen {
    width: 100vw; height: 100vh; height: 100dvh;
    background: #000;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0;
  }
  .play-game:fullscreen > .screen-frame {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    padding: 0; gap: 0;
    background: #000;
    border: none;
    justify-content: center;
    align-self: stretch;
    justify-self: stretch;
    max-width: none;
  }
  .play-game:fullscreen .screen-frame::before,
  .play-game:fullscreen .screen-frame::after { display: none; }
  .play-game:fullscreen .screen-wrap {
    flex: 1 1 auto;
    /* Override the default flex min-height:auto so the wrap can shrink
       below the canvas's intrinsic 144px when needed. */
    min-height: 0;
    min-width: 0;
    width: 100%;
    padding: 0;
    border: none;
    box-shadow: none;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .play-game:fullscreen #screen {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    aspect-ratio: 160 / 144;
  }
  .play-game:fullscreen .screen-label-bottom {
    flex: 0 0 auto;
    padding: 8px 16px;
    background: rgba(0,0,0,0.6);
  }
  .play-game:fullscreen > .gamepad { flex: 0 0 auto; margin-top: 0; }
  /* On mobile, JS relocates .log-area into .play-game between the canvas
     and the gamepad — hide it in fullscreen so the canvas gets the slack. */
  .play-game:fullscreen > .log-area { display: none; }
  /* Hide the keyboard-bindings hint whenever there's an on-screen gamepad
     visible alongside the canvas (fullscreen on a touch device). */
  @media (any-pointer: coarse) {
    .play-game:fullscreen .screen-keys { display: none; }
  }

  /* Portrait touch: pin the canvas to the top of the fullscreen viewport
     and let the gamepad sit against the bottom, so the slack between them
     scales with viewport height instead of inflating the canvas. */
  @media (orientation: portrait) and (any-pointer: coarse) {
    .play-game:fullscreen > .screen-frame { flex: 0 0 auto; }
    .play-game:fullscreen .screen-wrap { flex: 0 0 auto; }
    .play-game:fullscreen #screen {
      width: 100%;
      height: auto;
      object-fit: contain;
    }
    /* Auto margins on both sides center the gamepad in the slack between
       the pinned canvas and the viewport bottom. */
    .play-game:fullscreen > .gamepad {
      margin-top: auto;
      margin-bottom: auto;
    }
  }

  /* Landscape touch: split the gamepad around the canvas — dpad left,
     A/B + start/select right — mirroring the non-fullscreen landscape
     layout so there's vertical room for the canvas. */
  @media (orientation: landscape) and (any-pointer: coarse) {
    .play-game:fullscreen {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: 1fr auto auto 1fr;
      column-gap: 12px;
      row-gap: 16px;
      padding: 8px;
    }
    .play-game:fullscreen > .screen-frame {
      grid-column: 2;
      grid-row: 1 / -1;
      align-self: stretch;
      justify-self: stretch;
      min-width: 0; min-height: 0;
      max-width: 100%;
      max-height: 100dvh;
      height: 100%;
    }
    .play-game:fullscreen > .screen-frame .screen-wrap {
      height: 100%;
      min-height: 0;
    }
    /* Drop the aspect-ratio from the canvas so its box can fill the frame
       and `object-fit: contain` letterboxes the rendered image to fit
       whichever dimension is tighter (height in landscape). */
    .play-game:fullscreen #screen {
      aspect-ratio: auto;
    }
    .play-game:fullscreen > .gamepad,
    .play-game:fullscreen > .gamepad > .gamepad-row:not(.gp-ss) {
      display: contents;
    }
    .play-game:fullscreen .gp-dpad {
      grid-column: 1;
      grid-row: 1 / -1;
      align-self: center;
    }
    .play-game:fullscreen .gp-ab {
      grid-column: 3;
      grid-row: 2;
    }
    .play-stack .play-game:fullscreen .gp-ss {
      grid-column: 3;
      grid-row: 3;
      transform: translateY(56px);
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
      justify-content: flex-start;
    }
    .play-game:fullscreen .gp-ss .gp-btn { min-width: 0; }
  }

  /* Event log overlay: only visible in fullscreen, anchored top-left,
     does not intercept pointer events so the canvas still gets input. */
  .fs-log-overlay { display: none; }
  .play-game:fullscreen .fs-log-overlay {
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: absolute;
    top: 12px;
    left: 12px;
    max-width: min(520px, 40vw);
    pointer-events: none;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.4;
    color: var(--ink-0);
    text-shadow: 0 1px 2px rgba(0,0,0,0.9);
    z-index: 2;
  }
  .fs-log-line {
    padding: 2px 6px;
    background: rgba(0,0,0,0.45);
    border-left: 2px solid var(--jade);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .fs-log-line .fs-log-time { color: var(--ink-2); margin-right: 4px; }
  .fs-log-line.log-err  { border-left-color: var(--coral); }
  .fs-log-line.log-warn { border-left-color: var(--amber); }
  .fs-log-line.log-ok   { border-left-color: var(--jade-bright); }
  /* Glyph cue alongside the border colour so severity survives both the
     transient fade and colour-vision deficiency. */
  .fs-log-line.log-warn .fs-log-time::after { content: ' !'; color: var(--amber); font-weight: 700; }
  .fs-log-line.log-err  .fs-log-time::after { content: ' \00d7'; color: var(--coral); font-weight: 700; }
  .fs-log-line.log-ok   .fs-log-time::after { content: ' \2713'; color: var(--jade-bright); }
  @keyframes fs-line-fade {
    from { opacity: 1; }
    to   { opacity: 0; }
  }
  .vol {
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .vol-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .vol-label.muted { color: var(--coral); }
  .vol input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 2px;
    background: var(--line-bright);
    outline: none;
    cursor: pointer;
  }
  .vol input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 10px; height: 10px;
    background: var(--jade); border-radius: 50%;
    border: none;
    box-shadow: 0 0 6px rgba(149,123,194,0.4);
  }
  .vol input[type="range"]::-moz-range-thumb {
    width: 10px; height: 10px;
    background: var(--jade); border-radius: 50%;
    border: none;
  }

  .screen-wrap {
    position: relative;
    background: #000;
    padding: 10px;
    border: 1px solid var(--ink-3);
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.7),
      0 0 0 1px rgba(149,123,194,0.1),
      0 12px 30px rgba(0,0,0,0.5);
  }
  #screen {
    display: block;
    width: var(--screen-w);
    height: var(--screen-h);
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    filter: contrast(1.02) saturate(1.04);
  }

  .screen-idle {
    width: var(--screen-w); height: var(--screen-h);
    background: #000;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--jade);
    border: 1px solid var(--ink-3);
  }

  /* ---------- play controls ---------- */

  .session-form {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    align-items: end;
  }
  .session-form label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .session-form input {
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 9px 12px;
    color: var(--ink-0);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.02em;
    text-transform: none;
    outline: none;
  }
  .session-form input:focus { border-color: var(--jade); background: #0b0e0e; }
  .session-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
  }
  .session-actions button { padding: 10px 14px; }

  /* while connecting/live: hide connect, show inputs in read-only style
     so the form layout doesn't jump around */
  .app[data-session="live"] .session-actions #btn-connect,
  .app[data-session="connecting"] .session-actions #btn-connect { display: none; }
  .session-form input[readonly] {
    color: var(--ink-1);
    background: var(--bg-2);
    border-color: var(--line);
    cursor: default;
  }
  .session-form input[readonly]:focus { border-color: var(--line); background: var(--bg-2); }

  /* disconnect only shows while the session is connecting or live */
  #btn-disconnect { display: none; }
  .app[data-session="connecting"] #btn-disconnect,
  .app[data-session="live"] #btn-disconnect { display: inline-block; }

  .session-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 11px;
  }
  .session-links:empty { display: none; }
  .session-links a {
    color: var(--ink-1);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
    transition: border-color 140ms, color 140ms;
  }
  .session-links a:hover { color: var(--ink-0); border-color: var(--jade); }
  .session-links a::after { content: '↗'; color: var(--jade); font-size: 10px; }
  .session-links a[data-kind="download"]::after { content: '↓'; }
  .session-links a[data-kind="upload"]::after { content: '↑'; }

  /* ---------- console ---------- */
  .log-area { display: flex; flex-direction: column; gap: 0; margin-top: 2px; }
  .log-tabs {
    display: flex;
    border: 1px solid var(--line);
    border-bottom: none;
  }
  .log-tab {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    background: transparent;
    color: var(--ink-2);
    border: none;
    border-bottom: 2px solid transparent;
    padding: 14px 20px;
    cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .log-tab:hover { color: var(--ink-0); }
  .log-tab[data-active="true"] { color: var(--jade-bright); border-bottom-color: var(--jade-bright); }
  .tracker-panel {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--line);
    border-top: none;
    background: var(--bg-1);
    min-height: 0;
    flex: 1 1 auto;
    overflow: hidden;
  }
  .tracker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    color: var(--ink-2);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .tracker-go {
    color: var(--jade-bright);
    border: 1px solid var(--jade-bright);
    padding: 3px 8px;
    border-radius: 2px;
    font-weight: 600;
    letter-spacing: 0.22em;
  }
  .tracker-go[data-mode="glitched"] { color: var(--amber); border-color: var(--amber); }
  .tracker-empty {
    padding: 12px;
    color: var(--ink-2);
    font-family: var(--mono);
    font-size: 11px;
    flex: 1 1 auto;
  }
  .tracker-list {
    margin: 0;
    padding: 6px 12px;
    list-style: none;
    overflow: auto;
    flex: 1 1 auto;
    min-height: 0;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    color: var(--ink-1);
  }
  .tracker-loc { padding: 1px 0; }
  .hint-row { padding: 3px 0; }
  /* Separator between the outstanding group and the found group. A centred
     "found" label flanked by rules. */
  .hint-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0 2px;
    color: var(--ink-2);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .hint-divider::before,
  .hint-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .hint-item { color: var(--jade-bright); }
  .hint-loc { color: var(--ink-0); }
  .hint-sep, .hint-who { color: var(--ink-2); }
  .hint-status {
    margin-left: 8px;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 1px 5px;
  }
  .hint-status[data-status="priority"] { color: var(--jade-bright); border-color: var(--jade-bright); }
  .hint-status[data-status="avoid"]    { color: var(--coral); border-color: var(--coral); }
  .hint-status[data-status="found"]    { color: var(--ink-2); border-color: var(--line); }
  .hint-feedback {
    padding: 8px 12px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    color: var(--ink-1);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .hint-feedback[data-kind="ok"]  { color: var(--jade-bright); }
  .hint-feedback[data-kind="err"] { color: var(--coral); }
  .hint-feedback[data-kind="info"] { color: var(--ink-2); }
  #log {
    margin: 0;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    color: var(--ink-1);
    white-space: pre-wrap;
    word-break: break-word;
  }
  #log .log-time { color: var(--ink-2); }
  #log .log-info { color: var(--ink-0); }
  #log .log-warn { color: var(--amber); }
  #log .log-err  { color: var(--coral); }
  #log .log-ok   { color: var(--jade-bright); }
  #log .log-chat { color: var(--ink-0); background: rgba(149,123,194,0.05); padding: 0 2px; }
  /* Redundant non-color cue for log severity so warn/err/ok don't rely on
     hue alone (colorblind users + warn/info being close in lightness). */
  #log .log-warn::before { content: '! '; font-weight: 700; }
  #log .log-err::before  { content: '\00d7 '; font-weight: 700; }
  #log .log-ok::before   { content: '\2713 '; }

  .log-input-row {
    display: flex;
    border: 1px solid var(--line);
    margin-top: -1px;
    position: relative;
    background: var(--bg-1);
  }
  .log-input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--ink-0);
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    padding: 8px 12px;
    outline: none;
    min-width: 0;
  }
  .log-input::placeholder { color: var(--ink-2); opacity: 1; }
  .log-input-row:focus-within { border-color: var(--jade); }
  .log-input:disabled { color: var(--ink-2); cursor: not-allowed; }
  .log-send-btn {
    border: none;
    border-left: 1px solid var(--line);
    background: transparent;
    color: var(--ink-0);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 0 14px;
    cursor: pointer;
    transition: color 140ms, background 140ms;
  }
  .log-send-btn:hover:not(:disabled) { color: var(--jade-bright); background: rgba(149,123,194,0.08); }
  .log-send-btn:disabled { color: var(--ink-2); cursor: not-allowed; }

  /* ---------- on-screen gamepad (touch / narrow) ---------- */
  .gamepad {
    display: none;
    flex-direction: column;
    gap: 16px;
    padding: 14px 0 4px;
    user-select: none;
    -webkit-user-select: none;
    /* Allow vertical scrolling when the touch starts in the gap between
       buttons — buttons themselves override to `none` so presses don't
       initiate a scroll gesture. */
    touch-action: pan-y;
  }
  /* "never show on-screen controls" (settings → ui) — outranks the
     touch-device media query below that turns the gamepad on. */
  .gamepad[data-user-hidden="true"] { display: none; }
  .gamepad-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 0 8px;
  }
  .gamepad-row.gp-ss { justify-content: center; gap: 12px; }
  .gp-dpad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 0;
  }
  .gp-up    { grid-column: 2; grid-row: 1; }
  .gp-left  { grid-column: 1; grid-row: 2; }
  .gp-right { grid-column: 3; grid-row: 2; }
  .gp-down  { grid-column: 2; grid-row: 3; }
  /* Hide Unicode glyph text and draw pixel-centered triangles via borders. */
  .gp-dpad .gp-btn { font-size: 0; }
  .gp-dpad .gp-btn::before {
    content: '';
    display: block;
    width: 0; height: 0;
    border: 7px solid transparent;
  }
  .gp-dpad .gp-up::before    { border-bottom-color: var(--ink-0); margin-top: -5px; }
  .gp-dpad .gp-down::before  { border-top-color: var(--ink-0);    margin-bottom: -5px; }
  .gp-dpad .gp-left::before  { border-right-color: var(--ink-0);  margin-left: -5px; }
  .gp-dpad .gp-right::before { border-left-color: var(--ink-0);   margin-right: -5px; }
  .gp-ab { display: flex; gap: 18px; align-items: center; }
  .gp-ab .gp-btn {
    width: 58px; height: 58px;
    border-radius: 50%;
    font-size: 16px;
    font-weight: 600;
  }
  .gp-ab .gp-b { transform: translateY(8px); }     /* slight GB diagonal */
  .gp-ab .gp-a { transform: translateY(-8px); }
  .gp-ss .gp-btn {
    min-width: 96px;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .gp-btn {
    background: var(--bg-2);
    border: 1px solid var(--line-bright);
    color: var(--ink-0);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: none;
    /* The gamepad isn't a keyboard-nav target (we bind keys at the window
       level). Suppress the focus outline that lingers after a touch. */
    outline: none;
  }
  .gp-btn::-moz-focus-inner { border: 0; }
  .gp-btn:active, .gp-btn[data-held="1"] {
    background: var(--jade-deep);
    border-color: var(--jade);
    color: var(--ink-0);
  }
  .gp-a {
    background: rgba(235,59,121,0.14);
    border-color: rgba(235,59,121,0.55);
    color: var(--coral);
  }
  .gp-a:active, .gp-a[data-held="1"] { background: var(--coral); color: var(--bg-0); }
  .gp-b {
    background: rgba(149,123,194,0.14);
    border-color: rgba(149,123,194,0.55);
    color: var(--jade-bright);
  }
  .gp-b:active, .gp-b[data-held="1"] { background: var(--jade); color: var(--bg-0); }

  /* Touch-only mobile layout: on-screen gamepad, reserved play-game
     height, fluid canvas, log relocated into the game column. Gated on
     `any-pointer: coarse` (not plain `pointer: coarse`, not paired with
     `any-hover: none`) so stylus phones like the S24 Ultra — where the
     S Pen is the primary pointer and hovers — still qualify. */
  @media (max-width: 900px) and (any-pointer: coarse) {
    .gamepad { display: flex; }
    .screen-keys { display: none; }
    /* Canvas becomes fluid once we're on a touch-y viewport — desktop
       fixed --screen-w/h would otherwise lock landscape iPhone (667px)
       to the desktop scale and overflow the grid. */
    /* Override the desktop pin — on mobile the frame is a flex-column
       child of .play-game, where align-self controls horizontal alignment
       (cross-axis), so stretching is what we want. */
    .play-stack .screen-frame { justify-self: stretch; align-self: stretch; }
    .screen-frame {
      padding: 8px;
      align-self: stretch;
      align-items: stretch;
    }
    .screen-wrap {
      padding: 6px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #screen, .screen-idle {
      width: min(100%, calc(var(--emu-max-h, 100dvh) * 160 / 144));
      max-height: var(--emu-max-h, none);
      min-width: 0;
      min-height: 0;
      height: auto;
      aspect-ratio: 160 / 144;
    }
    /* .play-game (screen + gamepad) occupies at least the viewport minus
       nav/step padding so the sibling .play-controls is pushed below the
       fold. The gamepad follows the emulator directly rather than pinning
       to the bottom — on tall viewports any slack becomes empty space
       under the gamepad, which keeps start/select visible on short ones. */
    .play-game {
      display: flex;
      flex-direction: column;
      /* Height is pushed by JS via --play-game-h = viewport_bottom - top
         offset, so the gamepad's margin-top:auto anchor lands exactly on
         the viewport bottom rather than some guessed offset. */
      height: var(--play-game-h, calc(100dvh - 70px));
      gap: 14px;
    }
    .play-game > .screen-frame { flex: 0 0 auto; }
    .play-game > .gamepad { flex: 0 0 auto; margin-top: auto; }
    /* When JS relocates .log-area inside .play-game on mobile, it fills
       the slack between emulator and gamepad. The gamepad's margin-top
       auto becomes a no-op (nothing for it to absorb) so it still sits
       right after the log. */
    .play-game > .log-area {
      flex: 1 1 0;
      min-height: 0;
      margin: 0;
    }
    .play-game > .log-area .log-wrap { min-height: 0; }
    /* Post-gen artifact chips stack at mobile widths to avoid the
       filename titles forcing horizontal overflow. */
    .result-grid { grid-template-columns: 1fr; }

    /* The connection form moves out of the below-the-fold controls column
       and into a popup anchored from the nav session chip. Hidden until the
       chip toggles data-connect-open on .play-controls. Kept mounted (not
       removed) so boot prefill / connectSession can still reach #sess-*. */
    .connect-panel {
      display: none;
      position: fixed;
      top: 58px;
      left: 0;
      right: 0;
      width: calc(100% - 20px);
      max-width: 440px;
      margin: 0 auto;
      z-index: 901;
      gap: 12px;
      padding: 16px;
      background: linear-gradient(to bottom, var(--bg-1), var(--bg-0));
      border: 1px solid var(--line-bright);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-height: calc(100dvh - 72px);
      overflow: auto;
    }
    .connect-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .connect-panel-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-1);
    }
    .connect-panel-close {
      appearance: none; -webkit-appearance: none;
      background: none; border: none;
      color: var(--ink-2);
      font-size: 16px; line-height: 1;
      padding: 4px; cursor: pointer;
    }
    .connect-panel-close:hover { color: var(--coral); }

    .play-controls[data-connect-open="true"] .connect-backdrop {
      display: block;
      position: fixed; inset: 0;
      background: rgba(4, 6, 12, 0.72);
      backdrop-filter: blur(4px);
      z-index: 900;
      animation: modal-fade 160ms ease-out;
    }
    /* Float the nav above the backdrop while the popup is open so the chip
       stays tappable — its onClick toggles the popup closed. */
    .app[data-step="play"] .nav { position: relative; z-index: 902; }
    .play-controls[data-connect-open="true"] .connect-panel {
      display: flex;
      animation: connect-drop 180ms ease-out;
    }

    /* When the log is relocated inside .play-game, .play-controls is empty
       and .play-game already fills to the viewport bottom — collapse the
       play-stack gap and step bottom-padding so there's no dead scroll
       region underneath. When the log stays below (short viewports) these
       are left intact so it remains reachable. */
    html[data-log-inside="true"] .play-stack { gap: 0; }
    html[data-log-inside="true"] .step[data-step="play"] {
      min-height: 0;
      padding-bottom: 0;
    }
  }

  @keyframes connect-drop {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Landscape phones: there's no vertical room to stack gamepad under
     emulator. Split the gamepad around the emulator — dpad left, and
     A/B stacked over start/select on the right — so the emulator gets
     the full vertical height. Log is hidden; no room for it. */
  @media (max-width: 1100px) and (max-height: 600px) and (orientation: landscape) and (any-pointer: coarse) {
    .play-game {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: 1fr auto auto 1fr;
      column-gap: 12px;
      row-gap: 16px;
      height: var(--play-game-h, calc(100dvh - 70px));
    }
    /* Extra .play-stack ancestor for specificity — the wider
       @media (max-width: 1100px) block further down sets
       `.play-stack .screen-frame { justify-self: center }` which would
       otherwise win at landscape-mobile widths (match 900 + 1100 + LS,
       last-wins) and shrink the emulator. */
    .play-stack .play-game > .screen-frame {
      grid-column: 2;
      grid-row: 1 / -1;
      min-width: 0;
      min-height: 0;
      max-width: 100%;
      max-height: 100%;
      /* Vertically: size to content so the frame hugs the canvas + chrome
         rather than stretching down. Horizontally: stretch so the canvas
         has a width anchor to resolve its `100%` against. */
      align-self: center;
      justify-self: stretch;
    }
    /* Dissolve the gamepad + dpad-row wrappers so dpad/ab/ss land
       directly in the play-game grid. */
    .play-game > .gamepad,
    .play-game > .gamepad > .gamepad-row:not(.gp-ss) {
      display: contents;
    }
    .play-game .gp-dpad {
      grid-column: 1;
      grid-row: 1 / -1;
      align-self: center;
    }
    .play-game .gp-ab {
      grid-column: 3;
      grid-row: 2;
    }
    .play-game .gp-ss {
      grid-column: 3;
      grid-row: 3;
      /* Nudge start/select further from A/B without moving A/B — grid
         auto rows would otherwise re-center the pair if we changed the
         row-gap. */
      transform: translateY(56px);
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
      justify-content: flex-start;
    }
    .play-game .gp-ss .gp-btn { min-width: 0; }
    .step[data-step="play"] { padding-top: 6px; }

    /* Landscape-without-mobile-width (e.g. 1024x600 tablet). Apply the
       same fluid canvas sizing the 900px block uses, so the emulator
       doesn't revert to the desktop fixed --screen-w/h. */
    .screen-frame { padding: 8px; align-items: stretch; }
    .screen-wrap {
      padding: 6px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #screen, .screen-idle {
      width: min(100%, calc(var(--emu-max-h, 100dvh) * 160 / 144));
      max-height: var(--emu-max-h, none);
      min-width: 0;
      min-height: 0;
      height: auto;
      aspect-ratio: 160 / 144;
    }
    .gamepad { display: flex; }
    .screen-keys { display: none; }
  }

  /* ---------- responsive ---------- */
  @media (max-width: 1100px) {
    .play-stack {
      grid-template-columns: 1fr;
    }
    .play-stack .screen-frame { justify-self: center; }
  }

  /* Tablet / narrow desktop: stack the home blurb above the main pane. */
  @media (max-width: 820px) {
    .home {
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 28px 16px 40px;
    }
    .blurb h1 { font-size: 24px; }
    .blurb p, .blurb-list { font-size: 13px; }
    .home-card { padding: 16px; }
    .step { padding: 24px 16px 36px; }
    .nav { padding: 12px 16px; gap: 10px; }
    /* Collapse the three icon buttons into a single dropdown trigger so
       narrow widths don't crowd the bar — the trigger sits where the
       license icon used to. */
    .nav > .gh-link,
    .nav > .cog-btn,
    .nav > .license-link { display: none; }
    /* Specificity bump (.nav .nav-menu) so this beats the default
       `.nav-menu { display: none }` declared lower in the file regardless
       of source order. */
    .nav .nav-menu { display: block; }
  }

  /* Phones: session form collapses, gamepad buttons shrink.
     The canvas fluid-sizing moved up to the 900px gamepad block so
     landscape iPhone (667px) gets it too. */
  @media (max-width: 640px) {
    :root { --scale: 2; }
    .session-form { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: 1fr; }
    .blurb h1 { font-size: 22px; }
    .home { padding: 20px 12px 32px; }
    .step { padding: 20px 12px 28px; }
    .home-card { padding: 14px; }
    .nav { padding: 10px 12px; font-size: 12px; }
    .brand { font-size: 12px; }
    .session-chip { padding: 4px 10px; font-size: 9px; letter-spacing: 0.16em; }

    /* Shrink the gamepad so it fits on 375px viewports. */
    .gp-dpad {
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
    }
    .gp-ab .gp-btn { width: 52px; height: 52px; font-size: 15px; }
    .gp-ab { gap: 14px; }
    .gamepad-row { padding: 0 4px; gap: 10px; }
    .gamepad { gap: 14px; padding: 12px 0 20px; }
    .gp-ss .gp-btn {
      min-width: 72px;
      padding: 6px 10px;
      font-size: 10px;
      letter-spacing: 0.12em;
    }
  }

  /* Resume rows reshuffle early. Even when the home grid is still 2-col, the
     home-main column is narrow enough below ~1100px that the 4-col row
     overflows its container. */
  @media (max-width: 1100px) {
    .resume-row {
      grid-template-columns: 1fr auto;
      grid-template-areas: "slot actions" "id actions" "meta meta";
      gap: 6px 12px;
    }
    .resume-row .slot { grid-area: slot; }
    .resume-row .id { grid-area: id; }
    .resume-row .meta { grid-area: meta; text-align: left; }
    .resume-row .actions {
      grid-area: actions;
      align-self: start;
      flex-direction: column;
      gap: 6px;
    }
    .resume-row .actions button { width: 100%; }
  }

  /* ---------- misc ---------- */
  kbd {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 5px;
    border: 1px solid var(--line-bright);
    background: var(--bg-2);
    color: var(--ink-0);
    border-radius: 2px;
    margin: 0 1px;
  }
  .legend {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-2);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  /* ---------- settings cog + modal ---------- */
  .cog-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    padding: 0;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-1);
    cursor: pointer;
    transition: color 140ms, border-color 140ms, transform 300ms;
  }
  .cog-btn:hover { background: transparent; border-color: transparent; color: var(--jade-bright); transform: rotate(30deg); }
  .cog-btn svg { width: 18px; height: 18px; display: block; }

  .license-link {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    color: var(--ink-1);
    text-decoration: none;
    border-bottom: none;
    transition: color 140ms;
  }
  .license-link:hover { color: var(--jade-bright); border-bottom-color: transparent; }
  .license-link svg { width: 18px; height: 18px; display: block; }

  .nav-menu { position: relative; display: none; }
  .nav-menu-trigger {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    padding: 0;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-1);
    cursor: pointer;
    transition: color 140ms;
  }
  .nav-menu-trigger:hover { color: var(--jade-bright); }
  .nav-menu-trigger svg { width: 18px; height: 18px; display: block; }
  .nav-menu-panel {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    z-index: 100;
    min-width: 200px;
    background: linear-gradient(to bottom, var(--bg-1), var(--bg-0));
    border: 1px solid var(--line-bright);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    padding: 4px;
    display: flex; flex-direction: column;
  }
  .nav-menu-panel > a,
  .nav-menu-panel > button {
    text-align: left;
    background: transparent;
    border: none;
    color: var(--ink-1);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 9px 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 120ms, color 120ms;
  }
  .nav-menu-panel > a { border-bottom: none; }
  .nav-menu-panel > a:hover,
  .nav-menu-panel > button:hover {
    background: rgba(149,123,194,0.1);
    color: var(--jade-bright);
    border-bottom-color: transparent;
  }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(4, 6, 12, 0.72);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 8vh 16px 16px;
    animation: modal-fade 160ms ease-out;
  }
  @keyframes modal-fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 100%;
    max-width: 560px;
    background: linear-gradient(to bottom, var(--bg-1), var(--bg-0));
    border: 1px solid var(--line-bright);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    max-height: 82vh;
  }
  .modal-head {
    display: flex; align-items: stretch; justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }
  /* Five tabs no longer fit a narrow viewport — let the strip scroll
     sideways instead of spilling out of the modal. */
  .modal-tabs { display: flex; min-width: 0; overflow-x: auto; scrollbar-width: none; }
  .modal-tabs::-webkit-scrollbar { display: none; }
  .modal-tab {
    flex-shrink: 0;
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: transparent;
    color: var(--ink-2);
    border: none;
    border-bottom: 2px solid transparent;
    padding: 14px 20px;
    cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .modal-tab:hover { color: var(--ink-0); }
  .modal-tab[data-active="true"] { color: var(--jade-bright); border-bottom-color: var(--jade-bright); }
  .modal-close {
    background: transparent; border: none; color: var(--ink-2);
    font-size: 16px; width: 44px; flex-shrink: 0; cursor: pointer;
    transition: color 120ms;
  }
  .modal-close:hover { color: var(--coral); }
  .modal-body {
    padding: 20px;
    overflow: auto;
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-0);
    padding: 14px 20px;
    align-self: center;
    /* word-break so extremely long pasted filenames don't push the close
       button off the right edge of the modal. */
    word-break: break-all;
  }
  .yaml-preview-modal { max-width: 720px; margin: auto; }
  .yaml-preview {
    margin: 0;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    color: var(--ink-0);
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Prism token palette, scoped to the YAML preview so Prism's own CSS
     isn't needed. Keeps to our four-colour palette rather than importing
     one of Prism's themes. */
  .yaml-preview .token.key,
  .yaml-preview .token.atrule,
  .yaml-preview .token.tag,
  .yaml-preview .token.anchor,
  .yaml-preview .token.alias       { color: var(--jade-bright); }
  .yaml-preview .token.string,
  .yaml-preview .token.scalar      { color: var(--ink-0); }
  .yaml-preview .token.number      { color: var(--amber); }
  .yaml-preview .token.boolean,
  .yaml-preview .token.null        { color: var(--coral); }
  .yaml-preview .token.comment     { color: var(--ink-2); font-style: italic; }
  .yaml-preview .token.punctuation { color: var(--ink-2); }
  .yaml-preview .token.important   { color: var(--coral); font-weight: bold; }
  .resume-row-clickable { cursor: pointer; }
  .resume-row-clickable:hover { background: rgba(149,123,194,0.05); }

  /* yaml creator modal */
  .yc-open-btn { margin-left: auto; padding: 4px 10px; font-size: 11px; }
  .home-card:has(.yc-open-btn) { padding-top: 10px; }
  .yaml-creator { max-width: 880px; }
  .yaml-creator .modal-head { gap: 8px; align-items: center; }
  .yc-version {
    display: flex; gap: 4px; margin-left: auto; padding-right: 4px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .yc-version-opt {
    display: inline-flex; align-items: center; gap: 4px;

  .yc-header input, .yaml-creator input[type=text], .yaml-creator input[type=number], .yaml-creator select, .yaml-creator textarea {

  .yc-group { border: 1px solid var(--line); background: var(--bg-1); }

    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-1); list-style: none; }
  .yc-group-head::-webkit-details-marker { display: none; }

  .yc-group-chevron {
    display: inline-flex;

    transition: color 140ms;
  }
  .yc-group-chevron svg { display: block; transition: transform 140ms; }
  .yc-group[open] .yc-group-chevron { color: var(--jade-bright); }
  .yc-group[open] .yc-group-chevron svg { transform: rotate(180deg); }
  .yc-row { padding: 14px 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 6px; }
  .yc-row:first-of-type { border-top: none; }
  .yc-row-head { display: flex; align-items: center; gap: 8px; }
  .yc-row-name { font-family: var(--mono); font-size: 12px; color: var(--ink-0); }
  .yc-row-key { font-size: 10px; color: var(--ink-2); margin-left: 6px; }
  .yc-row-doc { font-size: 11px; color: var(--ink-2); white-space: pre-wrap; }
  .yc-row-doc[data-clickable="true"] { cursor: pointer; }

  .yc-row-doc[data-collapsed="true"] {
    display: -webkit-box;

  .yc-row-doc[data-collapsed="true"]::after {
    content: " ⌄";

  }
  .yc-weights-toggle { margin-left: auto; }
  .yc-inline { display: inline-flex; align-items: center; gap: 6px; }
  .yc-switch {
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-2);
  }
  .yc-switch input { position: absolute; opacity: 0; pointer-events: none; }
  .yc-switch-track {
    position: relative;
    width: 34px; height: 18px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    transition: background 140ms, border-color 140ms;
  }
  .yc-switch-thumb {
    position: absolute; top: 1px; left: 1px;
    width: 14px; height: 14px;
    background: var(--ink-2);
    transition: transform 140ms, background 140ms;
  }
  .yc-switch[data-on="true"] .yc-switch-track { background: rgba(64, 191, 137, 0.18); border-color: var(--jade-bright); }
  .yc-switch[data-on="true"] .yc-switch-thumb { transform: translateX(16px); background: var(--jade-bright); }

  .yc-switch:hover .yc-switch-track { border-color: var(--ink-1); }

  .yc-hint { color: var(--ink-2); font-size: 10px; font-family: var(--mono); }

  .yc-invalid { border-color: var(--coral) !important; color: var(--coral); }
  .yc-chip-x { background: transparent; border: none; color: var(--coral); cursor: pointer; font-size: 12px; padding: 0; line-height: 1; }
  .yc-btn { background: transparent; border: 1px solid var(--line); color: var(--ink-1); font-family: var(--mono); font-size: 11px; padding: 3px 8px; cursor: pointer; }

  .yc-preview .yaml-preview { max-height: 320px; overflow: auto; margin-top: 8px; background: var(--bg-0); padding: 8px; border: 1px solid var(--line); }
  .yc-foot { padding: 12px 20px; display: flex; gap: 8px; border-top: 1px solid var(--line); }
  .modal-foot { background: var(--bg-1); }

  /* controller panel */
  .ctrl-pad-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-1);
    display: flex; flex-direction: column; gap: 4px;
    padding: 10px 12px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    margin-bottom: 16px;
    overflow-wrap: anywhere;
  }
  .ctrl-pad-info .ctrl-k {
    display: inline-block;
    min-width: 64px;
    color: var(--ink-2);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-size: 9px;
  }
  .ctrl-pad-info .ctrl-v { color: var(--ink-0); }
  .ctrl-pad-info .muted { color: var(--ink-2); font-style: italic; }

  .ctrl-rows { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-row {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    transition: border-color 120ms, background 120ms;
  }
  .ctrl-row[data-capturing="true"] {
    border-color: var(--amber);
    background: rgba(232, 213, 160, 0.05);
  }
  .ctrl-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-1);
  }
  .ctrl-binding {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-0);
    padding: 3px 8px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    justify-self: start;
    transition: color 120ms, border-color 120ms, box-shadow 120ms;
  }
  .ctrl-binding[data-pressed="true"] {
    color: var(--jade-bright);
    border-color: var(--jade-bright);
    box-shadow: 0 0 8px rgba(149,123,194,0.4);
  }
  .ctrl-rebind {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: transparent;
    color: var(--ink-1);
    border: 1px solid var(--line-bright);
    padding: 5px 12px;
    cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .ctrl-rebind:hover { color: var(--jade-bright); border-color: var(--jade-bright); }

  .ctrl-actions {
    margin-top: 16px;
    display: flex; justify-content: flex-end;
  }
  .btn-ghost {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    background: transparent;
    color: var(--ink-2);
    border: 1px solid var(--line);
    padding: 6px 14px;
    cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .btn-ghost:hover { color: var(--coral); border-color: var(--coral); }

  .ctrl-tip {
    margin-top: 14px;
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.5;
  }

  /* saved yamls list reuses resume-row layout but needs an editable name cell */
  .yaml-list { margin-top: 12px; }
  /* Give row action buttons a consistent min width so short labels
     ("use") line up with longer ones ("forget", "resume"). */
  .resume-row .actions button { min-width: 72px; }
  /* Swap the hint copy on touch-primary devices so it says "tap" instead
     of "click". Falls back to desktop text if the media query is unsupported. */
  .hint-touch { display: none; }
  @media (any-pointer: coarse) {
    .hint-desktop { display: none; }
    .hint-touch   { display: inline; }
  }
  .resume-row .yaml-name-btn {
    background: transparent;
    border: none;
    padding: 0;
    font: inherit;
    color: inherit;
    letter-spacing: inherit;
    text-transform: none;
    cursor: text;
    text-align: left;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .resume-row .yaml-name-btn:hover { color: var(--jade-bright); background: transparent; border: none; }
  .resume-row .yaml-name-input {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-0);
    background: var(--bg-2);
    border: 1px solid var(--jade);
    padding: 3px 6px;
    width: 100%;
    box-sizing: border-box;
    outline: none;
  }

  /* overlay panel */
  .overlay-panel { display: flex; flex-direction: column; gap: 14px; }
  /* ui panel */
  .ui-panel { display: flex; flex-direction: column; gap: 14px; }
  .panel-intro {
    margin: 0 0 4px;
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .pref-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    align-items: center;
    gap: 16px;
    padding: 10px 12px;
    background: var(--bg-1);
    border: 1px solid var(--line);
  }
  .pref-label {
    display: flex; flex-direction: column; gap: 4px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-1);
    cursor: pointer;
  }
  .pref-label .pref-sub {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: none;
    color: var(--ink-2);
  }
  .pref-label .pref-sub strong { color: var(--ink-0); font-weight: normal; }
  .pref-input {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-0);
    background: var(--bg-2);
    border: 1px solid var(--line-bright);
    padding: 6px 10px;
    width: 100%;
    box-sizing: border-box;
    transition: border-color 120ms;
  }
  .pref-input:focus { outline: none; border-color: var(--jade); }
  /* Match the under-emulator volume slider so both controls feel like

  .pref-range {
    -webkit-appearance: none; appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line-bright);

    cursor: pointer;
  }
  .pref-range::-webkit-slider-thumb {

    box-shadow: 0 0 6px rgba(149,123,194,0.4);
  }
  .pref-range::-moz-range-thumb {
    width: 10px; height: 10px;
    background: var(--jade); border-radius: 50%;

  }

  .audio-bg-switch { margin-top: 18px; }
</style>
